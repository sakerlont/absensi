<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Cek Kehadiran Siswa Mandiri</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body, html { 
            margin: 0; padding: 0; min-height: 100%; 
            background: linear-gradient(135deg, #f1f5f3 0%, #e3ede7 50%, #f7f3ed 100%);
            background-attachment: fixed;
        }
        #canvas-animasi { position: fixed; top: 0; left: 0; z-index: 0; pointer-events: none; }
        .konten-wrapper { position: relative; z-index: 1; }
        .fade-smooth { animation: fadeSmooth 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes fadeSmooth { from { opacity: 0; transform: scale(0.99) translateY(4px); } to { opacity: 1; transform: scale(1) translateY(0); } }
    </style>
</head>
<body class="font-sans antialiased text-slate-700">

    <canvas id="canvas-animasi"></canvas>

    <div class="konten-wrapper flex flex-col justify-between min-h-screen">
        <header class="bg-white/50 backdrop-blur-lg border-b border-slate-100 py-3 px-6 sticky top-0 z-50 shadow-2xs">
            <div class="max-w-4xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 bg-emerald-50 text-emerald-600 rounded-xl flex items-center justify-center text-base font-bold"><i class="fa-solid fa-user-graduate"></i></div>
                    <div>
                        <h1 class="text-xs font-black tracking-wider text-slate-800 uppercase">PORTAL SISWA</h1>
                        <p class="text-[9px] font-extrabold text-emerald-600 tracking-widest uppercase">Kelas Ust. Tubagus</p>
                    </div>
                </div>
                <a href="index.html" class="px-3 py-1.5 border border-slate-200 bg-white hover:bg-slate-50 text-slate-600 font-bold text-xs rounded-xl flex items-center gap-1">Depan</a>
            </div>
        </header>

        <main class="max-w-3xl mx-auto p-4 md:p-6 w-full my-auto text-center fade-smooth">
            <div class="mb-6 mt-2">
                <h2 class="text-2xl font-black text-slate-800 tracking-tight">Silakan Cari Nama Kamu</h2>
                <p class="text-slate-400 text-xs mt-0.5">Pantau riwayat absensi harian secara transparan.</p>
            </div>

            <div class="mb-5 bg-white/60 backdrop-blur-lg p-4 rounded-2xl border border-slate-100 shadow-2xs max-w-lg mx-auto flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 text-left">
                <div>
                    <h3 class="text-xs font-bold text-slate-800">Matriks Sebaran Satu Kelas</h3>
                </div>
                <button onclick="bukaModalGridSiswa()" class="w-full sm:w-auto bg-slate-800 hover:bg-slate-700 text-white font-bold px-4 py-2 rounded-xl text-xs cursor-pointer transition-colors">Lihat Grid Bulanan</button>
            </div>

            <div class="bg-white/60 backdrop-blur-lg p-4 rounded-2xl border border-slate-100 shadow-2xs max-w-lg mx-auto mb-5 text-left">
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-3 mb-3">
                    <div>
                        <label class="block text-[10px] font-bold uppercase text-slate-400 tracking-wider mb-1">Kelas</label>
                        <select id="pilih-kelas-siswa" onchange="lakukanPencarianSiswaOnline()" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-2.5 py-1.5 text-xs font-bold text-slate-700 focus:outline-none focus:border-emerald-400 cursor-pointer">
                            <option value="X">Kelas X</option><option value="XI">Kelas XI</option><option value="XII">Kelas XII</option>
                        </select>
                    </div>
                    <div class="sm:col-span-2">
                        <label class="block text-[10px] font-bold uppercase text-slate-400 tracking-wider mb-1">Cari Nama</label>
                        <input type="text" id="input-pencarian-nama" onkeyup="lakukanPencarianSiswaOnline()" placeholder="Ketik potongan namamu..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-1.5 text-xs font-medium focus:outline-none focus:border-emerald-400 text-slate-700">
                    </div>
                </div>

                <div class="border-t border-slate-100 pt-3">
                    <div class="grid grid-cols-2 gap-3">
                        <div><span class="text-[9px] font-bold text-slate-400 block mb-1">Mulai:</span><input type="date" id="filter-tgl-mulai" onchange="lakukanPencarianSiswaOnline()" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-2 py-1 text-xs text-slate-600 text-center"></div>
                        <div><span class="text-[9px] font-bold text-slate-400 block mb-1">Sampai:</span><input type="date" id="filter-tgl-sampai" onchange="lakukanPencarianSiswaOnline()" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-2 py-1 text-xs text-slate-600 text-center"></div>
                    </div>
                </div>
            </div>

            <div id="container-hasil-pencarian" class="max-w-lg mx-auto space-y-4 text-left">
                <div class="text-center p-6 border border-dashed border-slate-200 rounded-2xl bg-white/40 text-slate-400 text-xs font-medium">Ketikkan namamu di atas untuk memeriksa log real-time server.</div>
            </div>
        </main>

        <footer class="py-4 text-center text-[11px] font-bold text-slate-300">&copy; 2026 E-Absensi Kelas Ust. Tubagus.</footer>
    </div>

    <div id="modal-grid-siswa-full" class="fixed inset-0 z-50 bg-slate-900/10 backdrop-blur-sm flex items-center justify-center p-2 sm:p-6" style="display: none;">
        <div class="bg-white border border-slate-100 w-full max-w-4xl rounded-2xl max-h-[85vh] flex flex-col shadow-xl overflow-hidden text-slate-700">
            <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                <h3 class="text-xs font-black text-slate-800 uppercase">Matriks Kelas Umum</h3>
                <button onclick="tutupModalGridSiswa()" class="text-slate-400 hover:text-slate-600 font-black text-lg px-2">&times;</button>
            </div>
            <div class="p-4 overflow-auto flex-1"><div class="overflow-x-auto border border-slate-100 rounded-xl" id="tempat-tabel-grid-siswa"></div></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSy...", authDomain: "YOUR-PROJECT.firebaseapp.com", databaseURL: "https://YOUR-PROJECT-default-rtdb.firebaseio.com", projectId: "YOUR-PROJECT" };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const databaseCloud = firebase.database();

        function amankanFormatFirebase(o) { return o ? Object.values(o) : []; }

        function lakukanPencarianSiswaOnline() {
            const tk = document.getElementById('pilih-kelas-siswa').value; const q = document.getElementById('input-pencarian-nama').value.trim().toLowerCase(); const container = document.getElementById('container-hasil-pencarian');
            if(q.length === 0) { container.innerHTML = `<div class="text-center p-6 border border-dashed border-slate-200 rounded-2xl bg-white/40 text-slate-400 text-xs font-medium">Ketikkan namamu di atas untuk memeriksa log real-time server.</div>`; return; }
            databaseCloud.ref('sekolah/' + tk).once('value').then((snap) => {
                let sArr = amankanFormatFirebase(snap.val()); let res = sArr.filter(x => x.nama.toLowerCase().includes(q));
                if(res.length === 0) { container.innerHTML = `<div class="text-center text-xs font-bold text-rose-400 p-6 bg-white/50 border border-slate-200 rounded-2xl">Nama tidak ditemukan.</div>`; return; }
                let h = ""; let bM = document.getElementById('filter-tgl-mulai').value ? new Date(document.getElementById('filter-tgl-mulai').value) : null; let bS = document.getElementById('filter-tgl-sampai').value ? new Date(document.getElementById('filter-tgl-sampai').value) : null;
                res.forEach(s => {
                    let hB=0, iB=0, sB=0, aB=0; let rHtml = ""; if(s.riwayat) { Object.keys(s.riwayat).sort().forEach(tkStr => { let p = tkStr.split("-"); let tObj = new Date(p[0], p[1]-1, p[2]); if(bM && tObj < bM) return; if(bS && tObj > bS) return; let st = s.riwayat[tkStr]; if(st==="H") hB++; else if(st==="I") iB++; else if(st==="S") sB++; else if(st==="A") aB++; let badge = st==="H"?"bg-emerald-50 text-emerald-600":st==="I"?"bg-amber-50 text-amber-600":st==="S"?"bg-sky-50 text-sky-600":"bg-rose-50 text-rose-600"; rHtml += `<div class="flex justify-between items-center py-2 text-[11px] font-semibold"><span>${p[2]}/${p[1]}</span><span class="px-2 py-0.5 rounded font-black ${badge}">${st}</span></div>`; }); }
                    let tot = hB+iB+sB+aB; let rasio = tot > 0 ? Math.round((hB/tot)*100) : 0;
                    h += `<div class="bg-white/60 border border-slate-100 rounded-2xl p-4 shadow-2xs"><div class="flex justify-between items-center border-b border-slate-100 pb-2 mb-2"><div><h4 class="text-xs font-black text-slate-700">${s.nama}</h4></div><div class="text-xs font-bold text-emerald-600">${rasio}% Hadir</div></div><div class="grid grid-cols-4 gap-2 text-center text-[10px] font-bold mb-3"><div class="bg-emerald-50/60 p-1 rounded text-emerald-600">${hB} H</div><div class="bg-amber-50/60 p-1 rounded text-amber-600">${iB} I</div><div class="bg-sky-50/60 p-1 rounded text-sky-600">${sB} S</div><div class="bg-rose-50/60 p-1 rounded text-rose-600">${aB} A</div></div><div class="bg-slate-50/50 rounded-xl p-2 max-h-[100px] overflow-auto divide-y divide-slate-100">${rHtml||'<p class="text-center text-[10px] text-slate-300">Log kosong.</p>'}</div></div>`;
                }); container.innerHTML = h;
            });
        }

        function bukaModalGridSiswa() {
            document.getElementById('modal-grid-siswa-full').style.display = "flex"; const k = document.getElementById('pilih-kelas-siswa').value;
            databaseCloud.ref('sekolah/' + k).once('value').then((snap) => {
                let siswa = amankanFormatFirebase(snap.val()); let listTanggal = []; siswa.forEach(s => { if(s.riwayat) Object.keys(s.riwayat).forEach(t => { if(!listTanggal.includes(t)) listTanggal.push(t); }); }); listTanggal.sort(); if(listTanggal.length===0) listTanggal.push("2026-01-01");
                let r = `<table class="w-full text-[10px] border-collapse text-left"><thead class="bg-slate-50 text-slate-400 font-bold"><tr><th class="p-2 border border-slate-200 text-center">No</th><th class="p-2 border border-slate-200 min-w-[100px]">Nama</th>`;
                listTanggal.forEach(t => { r += `<th class="p-2 text-center border border-slate-200">${t.split("-")[2]}/${t.split("-")[1]}</th>`; }); r += `<th class="p-2 border border-slate-200 text-emerald-600">H</th><th class="p-2 border border-slate-200 text-amber-500">I</th><th class="p-2 border border-slate-200 text-sky-500">S</th><th class="p-2 border border-slate-200 text-rose-500">A</th></tr></thead><tbody>`;
                siswa.forEach((s, i) => {
                    r += `<tr class="hover:bg-slate-50 text-slate-600"><td class="p-2 border border-slate-100 text-center bg-slate-50/50">${i+1}</td><td class="p-2 border border-slate-100 font-bold text-slate-700">${s.nama}</td>`; let hB=0, iB=0, sB=0, aB=0;
                    listTanggal.forEach(t => { let sim = (s.riwayat && s.riwayat[t]) ? s.riwayat[t] : "-"; if (sim === "H") hB++; else if (sim === "I") iB++; else if (sim === "S") sB++; else if (sim === "A") aB++; let c = sim==="H"?"text-emerald-500":sim==="I"?"text-amber-500":sim==="S"?"text-sky-500":sim==="A"?"text-rose-500":"text-slate-300"; r += `<td class="p-2 text-center border border-slate-100 font-bold ${c}">${sim}</td>`; });
                    r += `<td class="p-2 border border-slate-100 text-emerald-600 bg-emerald-50/20 text-center">${hB}</td><td class="p-2 border border-slate-100 text-amber-600 bg-amber-50/20 text-center">${iB}</td><td class="p-2 border border-slate-100 text-sky-600 bg-sky-50/20 text-center">${sB}</td><td class="p-2 border border-slate-100 text-rose-600 bg-rose-50/20 text-center">${aB}</td></tr>`;
                }); document.getElementById('tempat-tabel-grid-siswa').innerHTML = r + "</tbody></table>";
            });
        }
        function tutupModalGridSiswa() { document.getElementById('modal-grid-siswa-full').style.display = "none"; }

        const canvas = document.getElementById('canvas-animasi'); const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; } window.addEventListener('resize', resize); resize();
        let bolls = []; for(let i=0; i<6; i++) { bolls.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, dx: (Math.random() - 0.5) * 0.2, dy: (Math.random() - 0.5) * 0.2, r: Math.random() * 10 + 5 }); }
        function play() { ctx.clearRect(0, 0, canvas.width, canvas.height); bolls.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fillStyle = 'rgba(167, 243, 208, 0.05)'; ctx.fill(); b.x += b.dx; b.y += b.dy; if(b.x+b.r > canvas.width || b.x-b.r < 0) b.dx = -b.dx; if(b.y+b.r > canvas.height || b.y-b.r < 0) b.dy = -b.dy; }); requestAnimationFrame(play); } play();
    </script>
</body>
</html>
