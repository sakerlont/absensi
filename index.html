<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelas Ust. Tubagus</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { 
            margin: 0; padding: 0; overflow: hidden; height: 100%; 
            background: linear-gradient(135deg, #0f0f12 0%, #1a1510 50%, #2c1a04 100%);
            color: #f8fafc;
        }
        #canvas-animasi { position: absolute; top: 0; left: 0; z-index: 0; }
        .konten-utama { 
            position: relative; z-index: 1; height: 100vh; display: flex; 
            flex-direction: column; align-items: center; justify-content: center; 
        }
        .fade-smooth { animation: fadeSmooth 1.2s cubic-bezier(0.25, 1, 0.5, 1) forwards; }
        @keyframes fadeSmooth { 
            from { opacity: 0; transform: translateY(10px) scale(0.99); } 
            to { opacity: 1; transform: translateY(0) scale(1); } 
        }
        .modal-active { opacity: 1; pointer-events: auto; transform: scale(1); }
        .modal-inactive { opacity: 0; pointer-events: none; transform: scale(0.98); }
    </style>
</head>
<body>

    <canvas id="canvas-animasi"></canvas>

    <div class="konten-utama p-6 text-center">
        <h1 class="text-4xl md:text-5xl font-black mb-3 fade-smooth tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-orange-400 to-amber-500">Kelas Ust. Tubagus</h1>
        <p class="text-sm md:text-base text-orange-200/60 font-medium mb-12 fade-smooth" style="animation-delay: 0.1s;">Sistem Absensi Kehadiran Online &bull; Kelas VIII</p>
        
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-6 max-w-xl w-full px-4 fade-smooth" style="animation-delay: 0.2s;">
            <a href="siswa.html" class="group bg-neutral-900/50 backdrop-blur-lg border border-orange-500/10 p-6 rounded-2xl flex flex-col items-center justify-center gap-3 hover:border-orange-500/40 hover:bg-neutral-900/80 shadow-xl transition-all duration-300">
                <div class="w-14 h-14 bg-orange-500/10 text-orange-400 rounded-xl flex items-center justify-center text-2xl group-hover:scale-105 group-hover:bg-orange-500/20 transition-all duration-300">
                    <i class="fa-solid fa-user-graduate"></i>
                </div>
                <span class="font-bold text-xs tracking-wider uppercase text-orange-300">Portal Siswa</span>
                <span class="text-[11px] text-neutral-400 text-center font-medium">Cek mandiri grafik & riwayat absensi Anda</span>
            </a>

            <button onclick="bukaModalLogin()" class="group bg-neutral-900/50 backdrop-blur-lg border border-amber-500/10 p-6 rounded-2xl flex flex-col items-center justify-center gap-3 hover:border-amber-500/40 hover:bg-neutral-900/80 shadow-xl transition-all duration-300 text-left w-full cursor-pointer">
                <div class="w-14 h-14 bg-amber-500/10 text-amber-400 rounded-xl flex items-center justify-center text-2xl mx-auto group-hover:scale-105 group-hover:bg-amber-500/20 transition-all duration-300">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <span class="font-bold text-xs tracking-wider uppercase text-center w-full block text-amber-300">Portal Pengajar</span>
                <span class="text-[11px] text-neutral-400 text-center font-medium block w-full">Kelola data, input absen harian & rekap excel</span>
            </button>
        </div>

        <footer class="absolute bottom-6 text-[11px] font-bold text-neutral-600 fade-smooth" style="animation-delay: 0.3s;">
            &copy; 2026 E-Absensi Kelas Ust. Tubagus.
        </footer>
    </div>

    <div id="modal-login" class="modal-inactive fixed inset-0 z-50 bg-black/60 backdrop-blur-md flex items-center justify-center p-4 transition-all duration-300">
        <div class="bg-neutral-950/90 backdrop-blur-xl border border-neutral-800 w-full max-w-sm rounded-2xl p-6 shadow-2xl text-neutral-200 transition-all duration-300">
            <button onclick="tutupModalLogin()" class="absolute top-4 right-4 text-neutral-500 hover:text-white transition-colors p-1"><i class="fa-solid fa-xmark"></i></button>

            <div class="text-center mb-5">
                <div class="w-11 h-11 bg-orange-500/10 text-orange-400 rounded-xl flex items-center justify-center text-lg mx-auto mb-2"><i class="fa-solid fa-shield-halved"></i></div>
                <h3 class="text-base font-black text-white tracking-tight">Otentikasi Pengajar</h3>
            </div>

            <div id="login-error" class="hidden mb-3 bg-rose-950/40 border border-rose-800 text-rose-400 text-xs font-bold p-2.5 rounded-xl flex items-center gap-2 animate-pulse">
                <i class="fa-solid fa-circle-exclamation"></i> <span>Kombinasi akun salah!</span>
            </div>

            <form onsubmit="prosesLoginAdmin(event)" class="space-y-3">
                <div>
                    <label class="block text-[10px] font-bold uppercase text-neutral-400 tracking-wider mb-1">Username</label>
                    <input type="text" id="username-admin" placeholder="Username..." required class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-orange-500 text-white transition-colors">
                </div>
                <div>
                    <label class="block text-[10px] font-bold uppercase text-neutral-400 tracking-wider mb-1">Kata Sandi</label>
                    <input type="password" id="password-admin" placeholder="••••••••" required class="w-full bg-neutral-900 border border-neutral-800 rounded-xl px-3 py-2 text-xs focus:outline-none focus:border-orange-500 text-white transition-colors">
                </div>
                <button type="submit" class="w-full bg-orange-600 hover:bg-orange-500 text-white font-bold py-2 rounded-xl text-xs shadow-lg transition-all duration-200 mt-2 cursor-pointer">Masuk Sistem</button>
            </form>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('canvas-animasi'); const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();
        let bola = [];
        for(let i=0; i<10; i++) { bola.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, dx: (Math.random() - 0.5) * 0.3, dy: (Math.random() - 0.5) * 0.3, r: Math.random() * 30 + 20 }); }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            bola.forEach(b => {
                ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fillStyle = 'rgba(249, 115, 22, 0.04)'; ctx.fill(); ctx.closePath(); b.x += b.dx; b.y += b.dy;
                if (b.x + b.r > canvas.width || b.x - b.r < 0) b.dx = -b.dx; if (b.y + b.r > canvas.height || b.y - b.r < 0) b.dy = -b.dy;
            });
            requestAnimationFrame(draw);
        }
        draw();

        const modal = document.getElementById('modal-login'); const errorNotif = document.getElementById('login-error');
        function bukaModalLogin() { modal.classList.remove('modal-inactive'); modal.classList.add('modal-active'); errorNotif.classList.add('hidden'); document.getElementById('username-admin').focus(); }
        function tutupModalLogin() { modal.classList.remove('modal-active'); modal.classList.add('modal-inactive'); }
        
        function prosesLoginAdmin(e) { 
            e.preventDefault(); 
            const userVal = document.getElementById('username-admin').value.trim();
            const passVal = document.getElementById('password-admin').value.trim();

            if (userVal === "resiwahyuh" && passVal === "wakasis") { 
                window.location.href = "absensi.html"; 
            } else { 
                errorNotif.classList.remove('hidden'); 
            } 
        }
        window.onclick = function(e) { if (e.target == modal) tutupModalLogin(); }
    </script>
</body>
</html>
